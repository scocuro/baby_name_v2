<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>이름 후보 이어달리기</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --save: #059669;
      --discard: #ef4444;
      --accent: #f97316;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      --radius: 24px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
    }
    body { position: relative; }

    .drawer {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 20;
      transform: translateY(calc(-100% + 44px));
      transition: transform .24s ease;
      pointer-events: none;
    }
    .drawer.open { transform: translateY(0); }
    .drawer-panel {
      background: rgba(255,255,255,.98);
      backdrop-filter: blur(10px);
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      box-shadow: 0 12px 28px rgba(0,0,0,.10);
      pointer-events: auto;
      overflow: hidden;
    }
    .drawer-body {
      max-height: min(66vh, 540px);
      overflow-y: auto;
      padding: 14px 14px 12px;
    }
    .toggle-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      pointer-events: auto;
      padding: 0 10px;
    }
    .toggle-btn {
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,.98);
      box-shadow: 0 8px 18px rgba(0,0,0,.10);
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 900;
      color: #374151;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .arrow { transition: transform .2s ease; }
    .drawer.open .arrow { transform: rotate(180deg); }

    .similar-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.98);
      box-shadow: 0 8px 18px rgba(0,0,0,.10);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 900;
      color: #374151;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .similar-toggle input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      margin: 0;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    .subtitle {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      margin-top: 4px;
      line-height: 1.4;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .pill {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      color: #1f2937;
      background: #eef2ff;
      cursor: pointer;
    }
    .pill.red { background: #fee2e2; color: #991b1b; }
    .pill.gray { background: #f3f4f6; color: #374151; }
    .pill.green { background: #ecfdf5; color: #047857; }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .meta-card {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
    }
    .meta-card label {
      display: block;
      font-size: 11px;
      font-weight: 900;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .meta-card input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 11px;
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      background: #fff;
    }
    .stats {
      margin-top: 10px;
      padding: 12px;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.65;
      color: #374151;
    }

    .main {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 20px 14px 118px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .28s ease, filter .28s ease, opacity .28s ease;
    }
    body.similar-open .main {
      transform: scale(.94);
      filter: blur(1px);
      opacity: .55;
      pointer-events: none;
    }
    .deck {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 520px;
      max-height: 860px;
    }
    .card {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 100%;
      height: min(72vh, 560px);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      touch-action: none;
      padding: 16px;
      transition: transform .22s ease, opacity .22s ease;
      overflow: hidden;
    }
    .card.dragging { transition: none; }
    .name {
      font-size: clamp(50px, 13vw, 90px);
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.06em;
      margin-bottom: 16px;
      text-align: center;
      word-break: keep-all;
    }
    .hint {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
      font-weight: 700;
    }
    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 12px;
    }
    .mini-tag {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: #f3f4f6;
      color: #374151;
    }

    .footer-bar, .preview-footer {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 15;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(229,231,235,.9);
      box-shadow: 0 10px 26px rgba(0,0,0,.08);
      border-radius: 22px;
      padding: 10px 12px;
      display: grid;
      gap: 8px;
    }
    .footer-bar {
      grid-template-columns: repeat(4, 1fr);
      transition: opacity .2s ease, transform .2s ease;
    }
    .footer-btn, .submit-btn {
      border: none;
      border-radius: 16px;
      padding: 12px 8px;
      font-size: 12px;
      font-weight: 900;
      color: #374151;
      background: #f3f4f6;
      cursor: pointer;
    }
    .footer-btn.save { background: #ecfdf5; color: #047857; }
    .footer-btn.discard { background: #fef2f2; color: #b91c1c; }
    .footer-btn.alt { background: #fff7ed; color: #c2410c; }
    .footer-btn.gray { background: #f3f4f6; color: #374151; }

    .preview-footer {
      display: none;
      grid-template-columns: 1fr;
      z-index: 45;
    }
    .preview-footer.show { display: grid; }
    .submit-btn {
      background: #111827;
      color: white;
      font-size: 15px;
      padding: 16px 12px;
      font-weight: 900;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17,24,39,.44);
      backdrop-filter: blur(3px);
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .overlay.show { display: flex; }
    .modal {
      width: min(440px, 100%);
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 46px rgba(0,0,0,.18);
      overflow: hidden;
    }
    .modal-head { padding: 18px 18px 10px; }
    .modal-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 6px;
      letter-spacing: -0.03em;
    }
    .modal-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      font-weight: 700;
    }
    .modal-body {
      padding: 0 18px 18px;
      display: grid;
      gap: 8px;
    }
    .choice-btn {
      border: none;
      width: 100%;
      text-align: left;
      padding: 14px 14px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 900;
      color: #111827;
      background: #f8fafc;
      border: 1px solid var(--line);
      cursor: pointer;
    }
    .choice-btn.soft-red { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
    .choice-btn.soft-green { background: #ecfdf5; border-color: #bbf7d0; color: #047857; }
    .choice-btn.cancel { background: #f3f4f6; color: #374151; }

    .saved-mask {
      position: fixed;
      inset: 0;
      z-index: 34;
      display: none;
      background: rgba(17,24,39,.28);
      backdrop-filter: blur(4px);
    }
    .saved-mask.show { display: block; }
    .saved-sheet {
      position: fixed;
      inset: auto 0 0 0;
      z-index: 35;
      background: #fff;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -12px 30px rgba(0,0,0,.12);
      transform: translateY(100%);
      transition: transform .24s ease;
      max-height: 78vh;
      display: flex;
      flex-direction: column;
    }
    .saved-sheet.show { transform: translateY(0); }
    .saved-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: #fff;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
    }
    .saved-title { font-size: 17px; font-weight: 900; }
    .saved-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .saved-body {
      overflow: auto;
      padding: 14px 16px 24px;
      min-height: 180px;
      background: #fff;
    }
    .saved-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
    }
    .saved-item {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      font-size: 18px;
      font-weight: 900;
      text-align: center;
      letter-spacing: -0.03em;
      word-break: keep-all;
    }

    .similar-overlay {
      position: fixed;
      inset: 0;
      z-index: 42;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px 16px 110px;
      background: rgba(255,255,255,.14);
    }
    .similar-overlay.show { display: flex; animation: fadeIn .2s ease; }
    .similar-panel {
      width: min(560px, 100%);
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,255,255,.7);
      box-shadow: 0 18px 40px rgba(0,0,0,.16);
      border-radius: 28px;
      padding: 16px;
      backdrop-filter: blur(12px);
      animation: popIn .24s ease;
    }
    .similar-title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .similar-desc {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .similar-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .similar-grid.two-stack {
      grid-template-columns: 1fr;
    }
    .similar-card {
      min-height: 144px;
      border-radius: 22px;
      background: white;
      border: 2px solid #e5e7eb;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px 14px;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
      position: relative;
      user-select: none;
    }
    .similar-card:active { transform: scale(.98); }
    .similar-card.primary {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12), 0 10px 24px rgba(249, 115, 22, 0.18);
    }
    .similar-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12), 0 10px 24px rgba(249, 115, 22, 0.18);
    }
    .similar-card.locked::after {
      content: '기본 선택';
      position: absolute;
      left: 12px;
      top: 12px;
      font-size: 11px;
      font-weight: 900;
      color: var(--accent);
      background: #fff7ed;
      border-radius: 999px;
      padding: 6px 8px;
    }
    .similar-name {
      font-size: clamp(28px, 7vw, 42px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.05em;
      word-break: keep-all;
    }

    .undo-peek {
      position: fixed;
      left: 50%;
      bottom: 88px;
      transform: translateX(-50%) translateY(18px);
      z-index: 16;
      min-width: min(70vw, 320px);
      max-width: calc(100vw - 40px);
      border: none;
      border-radius: 18px;
      padding: 14px 20px;
      background: rgba(17,24,39,.95);
      color: white;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 12px 26px rgba(0,0,0,.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }
    .undo-peek.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 98px;
      transform: translateX(-50%) translateY(10px);
      z-index: 60;
      background: rgba(17,24,39,.94);
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      padding: 12px 14px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      max-width: calc(100vw - 32px);
      text-align: center;
      line-height: 1.4;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .empty {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      font-weight: 700;
      text-align: center;
      padding: 24px 0 8px;
    }

    @keyframes popIn {
      from { transform: scale(.94); opacity: .35; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 560px) {
      .meta-grid { grid-template-columns: 1fr; }
      .saved-grid { grid-template-columns: 1fr 1fr; }
      .card { height: min(68vh, 520px); }
      .footer-bar { grid-template-columns: repeat(2, 1fr); }
      .toggle-wrap {
        flex-direction: row;
        gap: 8px;
      }
      .similar-toggle {
        font-size: 11px;
        padding: 9px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="drawer" id="drawer">
    <div class="drawer-panel">
      <div class="drawer-body">
        <div class="title-row">
          <div>
            <div class="title">이름 후보 이어달리기</div>
            <div class="subtitle">좌우 스와이프로 보관/버림 · 보관함 별도 저장 · 세이브파일 공유 가능</div>
          </div>
          <div class="actions">
            <button class="pill" id="exportBtn">세이브 내보내기</button>
            <button class="pill gray" id="importBtn">세이브 불러오기</button>
            <button class="pill green" id="restoreBackupBtn">최근 백업 복원</button>
            <button class="pill red" id="resetBtn">초기화</button>
          </div>
        </div>

        <div class="meta-grid">
          <div class="meta-card">
            <label for="familyName">성</label>
            <input id="familyName" type="text" maxlength="4" placeholder="예: 강" />
          </div>
          <div class="meta-card">
            <label for="projectName">프로젝트 이름</label>
            <input id="projectName" type="text" maxlength="40" placeholder="예: 아기 이름 1차" />
          </div>
          <div class="meta-card">
            <label for="editorName">작업자 이름</label>
            <input id="editorName" type="text" maxlength="20" placeholder="예: 현서" />
          </div>
        </div>

        <div class="stats" id="stats"></div>
      </div>
    </div>

    <div class="toggle-wrap">
      <button class="toggle-btn" id="toggleDrawerBtn" type="button">
        설정 / 세이브 <span class="arrow">⌄</span>
      </button>
      <label class="similar-toggle" for="similarAssistEnabled">
        <input type="checkbox" id="similarAssistEnabled" />
        유사사례 같이보기
      </label>
    </div>
  </div>

  <main class="main" id="main">
    <div class="deck" id="deck"></div>
  </main>

  <div class="footer-bar" id="footerBar">
    <button class="footer-btn save" id="saveActionBtn" type="button">왼쪽 = 보관</button>
    <button class="footer-btn discard" id="discardActionBtn" type="button">오른쪽 = 버림</button>
    <button class="footer-btn alt" id="openSavedBtn" type="button">보관함</button>
    <button class="footer-btn gray" id="openDrawerBtn" type="button">설정 열기</button>
  </div>

  <div class="preview-footer" id="previewFooter">
    <button class="submit-btn" id="submitSimilarBtn" type="button">제출</button>
  </div>

  <button class="undo-peek" id="undoPeekBtn" type="button">이전 카드 복구</button>

  <div class="overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">선택</div>
        <div class="modal-desc" id="modalDesc"></div>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="saved-mask" id="savedMask"></div>
  <div class="saved-sheet" id="savedSheet">
    <div class="saved-head">
      <div class="saved-title">보관함</div>
      <div class="saved-tools">
        <button class="pill green" id="exportSavedTxtBtn" type="button">TXT 저장</button>
        <button class="pill" id="copySavedBtn" type="button">목록 복사</button>
        <button class="pill gray" id="closeSavedBtn" type="button">닫기</button>
      </div>
    </div>
    <div class="saved-body" id="savedBody"></div>
  </div>

  <div class="similar-overlay" id="similarOverlay">
    <div class="similar-panel">
      <div class="similar-title">유사사례 같이보기</div>
      <div class="similar-desc" id="similarDesc"></div>
      <div class="similar-grid" id="similarGrid"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

      renderCard();
    }

    function renderStats() {
      const total = allCards.length;
      const savedCount = savedState.saved.length;
      const seenCount = coreState.seenIds.length;
      const remainingCount = getRemainingPool().length;
      const similarEnabled = coreState.similarAssistEnabled ? '켜짐' : '꺼짐';
      const lastSaved = coreState.lastSavedAt ? new Date(coreState.lastSavedAt).toLocaleString('ko-KR') : '없음';
      const editor = coreState.lastEditedBy || '-';

      statsEl.innerHTML = [
        `전체 이름 카드: <b>${total.toLocaleString()}</b>개`,
        `아직 안 본 카드: <b>${remainingCount.toLocaleString()}</b>개`,
        `보관함: <b>${savedCount.toLocaleString()}</b>개`,
        `검토 완료: <b>${seenCount.toLocaleString()}</b>개`,
        `성: <b>${coreState.familyName || '강'}</b>`,
        `유사사례 같이보기: <b>${similarEnabled}</b>`,
        `최근 저장: <b>${lastSaved}</b>`,
        `최근 작업자: <b>${editor}</b>`,
        `로컬 백업: <b>${hasBackup() ? '있음' : '없음'}</b>`,
        `이전 카드 복구: <b>${actionHistory.length}건 가능</b>`
      ].join('<br>');
    }

    function renderSavedSheet() {
      if (savedState.saved.length === 0) {
        savedBody.innerHTML = '<div class="empty">아직 보관한 이름이 없습니다.<br>카드를 왼쪽으로 스와이프하면 보관됩니다.</div>';
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'saved-grid';
      [...savedState.saved].slice().reverse().forEach(item => {
        const div = document.createElement('div');
        div.className = 'saved-item';
        div.textContent = getFullName(item.given);
        grid.appendChild(div);
      });
      savedBody.innerHTML = '';
      savedBody.appendChild(grid);
    }

    function openSavedSheet() {
      if (pendingSimilarPick) return;
      savedMask.classList.add('show');
      savedSheet.classList.add('show');
    }

    function closeSavedSheet() {
      savedMask.classList.remove('show');
      savedSheet.classList.remove('show');
    }

    function renderCard() {
      deck.innerHTML = '';

      const nextItem = pickRandomRemaining();
      if (!nextItem) {
        const empty = document.createElement('div');
        empty.className = 'card';
        empty.innerHTML = `
          <div class="name" style="font-size: clamp(32px, 8vw, 56px);">끝!</div>
          <div class="hint">
            더 이상 볼 카드가 없습니다.<br>
            세이브파일을 내보내거나, 이전 카드 복구를 사용할 수 있습니다.
          </div>
          <div class="tag-row">
            <button class="pill" id="openSavedInline" type="button">보관함 보기</button>
            <button class="pill gray" id="openDrawerInline" type="button">설정 열기</button>
          </div>
        `;
        deck.appendChild(empty);
        currentCard = null;
        empty.querySelector('#openSavedInline').addEventListener('click', openSavedSheet);
        empty.querySelector('#openDrawerInline').addEventListener('click', () => drawer.classList.add('open'));
        return;
      }

      const next = getCardData(nextItem);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="name">${escapeHtml(next.full)}</div>
        <div class="hint">
          왼쪽 스와이프: 보관 · 오른쪽 스와이프: 버림
        </div>
        <div class="tag-row">
          <span class="mini-tag">이름: ${escapeHtml(next.given)}</span>
          <button class="pill gray" id="savedOpenBtn" type="button">보관함</button>
        </div>
      `;
      deck.appendChild(card);
      card.querySelector('#savedOpenBtn').addEventListener('click', openSavedSheet);

      currentCard = { el: card, data: next };
      bindCardSwipe(card, next);
    }

    function bindCardSwipe(card, data) {
      let startX = 0;
      let startY = 0;
      let dx = 0;
      let dy = 0;
      let dragging = false;
      let pointerId = null;

      card.addEventListener('pointerdown', e => {
        if (modalOverlay.classList.contains('show') || savedSheet.classList.contains('show') || pendingSimilarPick) return;
        dragging = true;
        pointerId = e.pointerId;
        startX = e.clientX;
        startY = e.clientY;
        dx = 0;
        dy = 0;
        card.classList.add('dragging');
        try { card.setPointerCapture(pointerId); } catch (err) {}
      });

      card.addEventListener('pointermove', e => {
        if (!dragging) return;
        dx = e.clientX - startX;
        dy = e.clientY - startY;
        const rotate = dx * 0.05;
        card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rotate}deg)`;
      });

      const endDrag = () => {
        if (!dragging) return;
        dragging = false;
        card.classList.remove('dragging');

        const absX = Math.abs(dx);
        const absY = Math.abs(dy);
        const threshold = 78;

        if (absX > threshold && absX > absY) {
          if (dx < 0) handleSaveChoice(data, card);
          else handleDiscardChoice(data, card);
        } else {
          card.style.transform = '';
        }
      };

      card.addEventListener('pointerup', endDrag);
      card.addEventListener('pointercancel', endDrag);
      card.addEventListener('lostpointercapture', () => { if (dragging) endDrag(); });
    }

    function handleSaveChoice(data, cardEl) {
      if (coreState.similarAssistEnabled) {
        const set = similarSetMap[data.given];
        if (Array.isArray(set) && set.length > 1) {
          animateOut(cardEl, -window.innerWidth * 1.1, 18);
          setTimeout(() => openSimilarOverlay(data), 120);
          return;
        }
      }
      commitSaveAction(data, [data.id], [data.id], false);
      animateOut(cardEl, -window.innerWidth * 1.1, 18);
      setTimeout(renderAll, 180);
      showToast(`보관: ${data.full}`);
    }

    function handleDiscardChoice(data, cardEl) {
      const addedSeenIds = addSeenIds([data.id]);
      pushAction({
        type: 'discard',
        focusId: data.id,
        addedSaveIds: [],
        addedSeenIds
      });
      coreState.lastEditedBy = coreState.editorName || coreState.lastEditedBy || '';
      coreState.lastSavedAt = new Date().toISOString();
      persistAll();
      animateOut(cardEl, window.innerWidth * 1.1, -18);
      setTimeout(renderAll, 180);
      showToast(`버림: ${data.full}`);
    }

    function openSimilarOverlay(primaryData) {
      const set = Array.isArray(similarSetMap[primaryData.given]) ? similarSetMap[primaryData.given].filter(name => name !== primaryData.given) : [];
      const sampleOthers = shuffle(set).slice(0, 3);
      const displayNames = [primaryData.given, ...sampleOthers];
      pendingSimilarPick = {
        primaryId: primaryData.id,
        primaryGiven: primaryData.given,
        shownGivens: displayNames,
        selectedIds: new Set([primaryData.id])
      };

      similarGrid.innerHTML = '';
      similarGrid.className = 'similar-grid' + (displayNames.length === 2 ? ' two-stack' : '');
      similarDesc.innerHTML = `방금 보관하려던 <b>${escapeHtml(primaryData.full)}</b>와 유사군에 속한 이름입니다.<br>원하는 이름을 추가로 선택한 뒤 제출하세요.`;

      displayNames.forEach((given, index) => {
        const item = itemByGiven.get(given);
        if (!item) return;
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'similar-card';
        const isPrimary = index === 0;
        if (isPrimary) card.classList.add('primary', 'selected', 'locked');
        card.dataset.id = item.id;
        card.innerHTML = `<div class="similar-name">${escapeHtml(getFullName(given))}</div>`;
        if (!isPrimary) {
          card.addEventListener('click', () => {
            const id = item.id;
            if (pendingSimilarPick.selectedIds.has(id)) {
              pendingSimilarPick.selectedIds.delete(id);
              card.classList.remove('selected');
            } else {
              pendingSimilarPick.selectedIds.add(id);
              card.classList.add('selected');
            }
          });
        }
        similarGrid.appendChild(card);
      });

      document.body.classList.add('similar-open');
      similarOverlay.classList.add('show');
      footerBar.style.display = 'none';
      previewFooter.classList.add('show');
    }

    function closeSimilarOverlay() {
      pendingSimilarPick = null;
      document.body.classList.remove('similar-open');
      similarOverlay.classList.remove('show');
      previewFooter.classList.remove('show');
      footerBar.style.display = 'grid';
      if (currentCard && currentCard.el) currentCard.el.style.transform = '';
    }

    function submitSimilarChoices() {
      if (!pendingSimilarPick) return;
      const selectedIds = Array.from(pendingSimilarPick.selectedIds);
      const primaryItem = itemById.get(pendingSimilarPick.primaryId);
      const primaryData = getCardData(primaryItem);

      commitSaveAction(primaryData, selectedIds, selectedIds, true);
      closeSimilarOverlay();
      renderAll();
      showToast(`보관 완료: ${selectedIds.length}개`);
    }

    function commitSaveAction(primaryData, saveIds, seenIds, fromSimilar) {
      const addedSaveIds = addSavedIds(saveIds);
      const addedSeenIds = addSeenIds(seenIds);
      pushAction({
        type: 'save',
        focusId: primaryData.id,
        addedSaveIds,
        addedSeenIds,
        fromSimilar: !!fromSimilar
      });
      coreState.lastEditedBy = coreState.editorName || coreState.lastEditedBy || '';
      coreState.lastSavedAt = new Date().toISOString();
      persistAll();
    }

    function addSavedIds(ids) {
      const added = [];
      ids.forEach(id => {
        const item = itemById.get(id);
        if (!item) return;
        if (!savedState.saved.some(x => x.id === id)) {
          savedState.saved.push({
            id,
            given: item.given,
            savedAt: new Date().toISOString()
          });
          added.push(id);
        }
      });
      return added;
    }

    function addSeenIds(ids) {
      const added = [];
      ids.forEach(id => {
        if (!coreState.seenIds.includes(id)) {
          coreState.seenIds.push(id);
          added.push(id);
        }
      });
      return added;
    }

    function pushAction(action) {
      actionHistory.push(action);
      if (actionHistory.length > MAX_ACTION_HISTORY) actionHistory.shift();
      updateUndoButton();
      showUndoPeek();
    }

    function updateUndoButton() {
      undoPeekBtn.textContent = actionHistory.length === 0 ? '이전 카드 복구' : `이전 카드 복구 (${actionHistory.length})`;
    }

    function undoLastAction() {
      if (!actionHistory.length) {
        showToast('복구할 이전 카드가 없습니다');
        return;
      }
      const last = actionHistory.pop();

      if (last.addedSaveIds && last.addedSaveIds.length) {
        const removeSet = new Set(last.addedSaveIds);
        savedState.saved = savedState.saved.filter(item => !removeSet.has(item.id));
      }
      if (last.addedSeenIds && last.addedSeenIds.length) {
        const seenRemoveSet = new Set(last.addedSeenIds);
        coreState.seenIds = coreState.seenIds.filter(id => !seenRemoveSet.has(id));
      }

      forcedNextCardId = last.focusId || null;
      persistAll();
      updateUndoButton();
      closeSimilarOverlay();
      renderAll();

      const item = itemById.get(last.focusId);
      if (item) showToast(`복구: ${getFullName(item.given)}`);
      else showToast('이전 카드를 복구했습니다');
    }

    function animateOut(el, x, deg) {
      if (!el) return;
      el.style.transform = `translate(${x}px, 20px) rotate(${deg}deg)`;
      el.style.opacity = '0';
    }

    function getRemainingPool() {
      const seen = new Set(coreState.seenIds);
      return allCards.filter(item => !seen.has(item.id));
    }

    function pickRandomRemaining() {
      if (forcedNextCardId) {
        const forcedItem = itemById.get(forcedNextCardId);
        forcedNextCardId = null;
        if (forcedItem && !coreState.seenIds.includes(forcedItem.id)) return forcedItem;
      }
      const pool = getRemainingPool();
      if (!pool.length) return null;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function sanitizeStates() {
      const validIds = new Set(allCards.map(item => item.id));
      if (!coreState.projectName) coreState.projectName = '이름 후보 1차';
      if (typeof coreState.editorName !== 'string') coreState.editorName = '';
      if (typeof coreState.lastEditedBy !== 'string') coreState.lastEditedBy = '';
      if (typeof coreState.familyName !== 'string') coreState.familyName = '';
      coreState.familyName = coreState.familyName.trim();
      coreState.seenIds = Array.isArray(coreState.seenIds) ? Array.from(new Set(coreState.seenIds.filter(id => validIds.has(id)))) : [];
      coreState.similarAssistEnabled = !!coreState.similarAssistEnabled;
      savedState.saved = Array.isArray(savedState.saved) ? dedupeSaved(savedState.saved).filter(item => validIds.has(item.id)) : [];
      persistAll();
    }

    function dedupeSaved(items) {
      const map = new Map();
      items.forEach(item => {
        if (!item || !item.id || !itemById.has(item.id)) return;
        if (!map.has(item.id)) {
          map.set(item.id, {
            id: item.id,
            given: item.given || itemById.get(item.id).given,
            savedAt: item.savedAt || ''
          });
        }
      });
      return Array.from(map.values());
    }

    function exportSaveFile() {
      coreState.familyName = normalizeFamilyName(familyNameInput.value);
      familyNameInput.value = coreState.familyName;
      coreState.projectName = projectNameInput.value.trim() || coreState.projectName || '이름 후보 1차';
      coreState.editorName = editorNameInput.value.trim();
      coreState.similarAssistEnabled = similarAssistCheckbox.checked;
      coreState.lastEditedBy = coreState.editorName || coreState.lastEditedBy || '';
      coreState.lastSavedAt = new Date().toISOString();
      persistAll();

      const payload = {
        version: VERSION,
        namesHash,
        exportedAt: new Date().toISOString(),
        coreState,
        savedState
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const a = document.createElement('a');
      const safeProject = (coreState.projectName || 'name_project').replace(/[^\w가-힣-]+/g, '_');
      const safeEditor = (coreState.editorName || 'user').replace(/[^\w가-힣-]+/g, '_');
      const stamp = new Date().toISOString().replace(/[:.]/g, '-');
      a.href = URL.createObjectURL(blob);
      a.download = `${safeProject}_${safeEditor}_${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 500);
      renderStats();
      showToast('세이브파일을 내보냈습니다');
    }

    async function handleImportFile(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        const parsed = JSON.parse(String(text).trim());
        if (!parsed || typeof parsed !== 'object') throw new Error('잘못된 JSON 형식입니다.');

        const importedHash = parsed.namesHash || parsed.coreState?.namesHash || parsed.savedState?.namesHash;
        if (importedHash && importedHash !== namesHash) {
          throw new Error('이 파일은 현재 이름 명단과 맞지 않습니다.');
        }

        if (parsed.coreState || parsed.savedState) {
          coreState = { ...defaultCoreState(), ...(parsed.coreState || {}) };
          savedState = { ...defaultSavedState(), ...(parsed.savedState || {}) };
        } else {
          coreState = { ...defaultCoreState(), ...parsed };
          savedState = { ...defaultSavedState(), saved: Array.isArray(parsed.saved) ? parsed.saved : [] };
        }

        sanitizeStates();
        actionHistory.length = 0;
        forcedNextCardId = null;
        pendingSimilarPick = null;
        familyNameInput.value = coreState.familyName || '';
        projectNameInput.value = coreState.projectName || '';
        editorNameInput.value = coreState.editorName || '';
        similarAssistCheckbox.checked = !!coreState.similarAssistEnabled;
        persistAll();
        closeModal();
        closeSavedSheet();
        closeSimilarOverlay();
        renderAll();
        showToast('세이브파일을 불러왔습니다');
      } catch (err) {
        console.error(err);
        alert('불러오기 실패: ' + (err && err.message ? err.message : 'JSON 파일을 읽지 못했습니다.'));
      } finally {
        event.target.value = '';
      }
    }

    function exportSavedTxt() {
      if (!savedState.saved.length) {
        showToast('보관함이 비어 있습니다');
        return;
      }
      const lines = savedState.saved.map(item => getFullName(item.given));
      const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      const safeProject = (coreState.projectName || 'saved_names').replace(/[^\w가-힣-]+/g, '_');
      const stamp = new Date().toISOString().replace(/[:.]/g, '-');
      a.href = URL.createObjectURL(blob);
      a.download = `${safeProject}_saved_${stamp}.txt`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 500);
      showToast('보관함 TXT를 저장했습니다');
    }

    function restoreBackup() {
      const raw = localStorage.getItem(BACKUP_KEY);
      if (!raw) {
        showToast('복원할 백업이 없습니다');
        return;
      }

      openChoiceModal({
        title: '최근 백업 복원',
        desc: '현재 상태를 최근 로컬 백업으로 되돌립니다. 보관함 복구용입니다.',
        choices: [
          {
            label: '백업으로 복원하기',
            className: 'soft-green',
            onClick: () => {
              try {
                const backup = JSON.parse(raw);
                coreState = { ...defaultCoreState(), ...(backup.coreState || {}) };
                savedState = { ...defaultSavedState(), ...(backup.savedState || {}) };
                actionHistory.length = 0;
                forcedNextCardId = null;
                pendingSimilarPick = null;
                sanitizeStates();
                familyNameInput.value = coreState.familyName || '';
                projectNameInput.value = coreState.projectName || '';
                editorNameInput.value = coreState.editorName || '';
                similarAssistCheckbox.checked = !!coreState.similarAssistEnabled;
                persistAll();
                closeModal();
                closeSavedSheet();
                closeSimilarOverlay();
                renderAll();
                showToast('최근 백업으로 복원했습니다');
              } catch (err) {
                console.error(err);
                closeModal();
                showToast('백업 복원에 실패했습니다');
              }
            }
          },
          { label: '취소', className: 'cancel', onClick: closeModal }
        ]
      });
    }

    function hasBackup() {
      return !!localStorage.getItem(BACKUP_KEY);
    }

    function loadCoreState() {
      try {
        const raw = localStorage.getItem(CORE_KEY);
        if (!raw) return defaultCoreState();
        const parsed = JSON.parse(raw);
        if (parsed.namesHash && parsed.namesHash !== namesHash) return defaultCoreState();
        return { ...defaultCoreState(), ...parsed };
      } catch (err) {
        return defaultCoreState();
      }
    }

    function loadSavedState() {
      try {
        const raw = localStorage.getItem(SAVED_KEY);
        if (!raw) return defaultSavedState();
        const parsed = JSON.parse(raw);
        if (parsed.namesHash && parsed.namesHash !== namesHash) return defaultSavedState();
        return { ...defaultSavedState(), ...parsed };
      } catch (err) {
        return defaultSavedState();
      }
    }

    function persistAll() {
      try {
        localStorage.setItem(CORE_KEY, JSON.stringify(coreState));
        localStorage.setItem(SAVED_KEY, JSON.stringify(savedState));
        localStorage.setItem(BACKUP_KEY, JSON.stringify({
          version: VERSION,
          namesHash,
          backedUpAt: new Date().toISOString(),
          coreState,
          savedState
        }));
      } catch (err) {
        console.error(err);
        showToast('저장 공간 문제로 일부 저장에 실패했을 수 있습니다');
      }
    }

    function openChoiceModal({ title, desc, choices }) {
      modalTitle.textContent = title;
      modalDesc.textContent = desc || '';
      modalBody.innerHTML = '';
      choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = `choice-btn ${choice.className || ''}`;
        btn.textContent = choice.label;
        btn.addEventListener('click', choice.onClick);
        modalBody.appendChild(btn);
      });
      modalOverlay.classList.add('show');
    }

    function closeModal() {
      modalOverlay.classList.remove('show');
    }

    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) closeModal();
    });

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return String(hash);
    }

    function showUndoPeek() {
      if (actionHistory.length === 0 || pendingSimilarPick) return;
      clearTimeout(undoPeekTimer);
      undoPeekBtn.classList.add('show');
      undoPeekTimer = setTimeout(() => undoPeekBtn.classList.remove('show'), 2600);
    }

    function hideUndoPeek() {
      clearTimeout(undoPeekTimer);
      undoPeekBtn.classList.remove('show');
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toastEl.textContent = message;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    document.addEventListener('keydown', e => {
      if (modalOverlay.classList.contains('show')) return;

      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
        e.preventDefault();
        undoLastAction();
        return;
      }

      if (savedSheet.classList.contains('show') || pendingSimilarPick) return;
      if (!currentCard) return;

      if (e.key === 'ArrowLeft') handleSaveChoice(currentCard.data, currentCard.el);
      if (e.key === 'ArrowRight') handleDiscardChoice(currentCard.data, currentCard.el);
    });

    document.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      if (modalOverlay.classList.contains('show') || savedSheet.classList.contains('show') || pendingSimilarPick) return;
      const t = e.touches[0];
      if (t.clientY >= window.innerHeight - 180) {
        bottomGestureStart = { x: t.clientX, y: t.clientY };
      }
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (!bottomGestureStart) return;
      const t = e.changedTouches[0];
      const dx = Math.abs(t.clientX - bottomGestureStart.x);
      const dy = bottomGestureStart.y - t.clientY;
      if (dy > 55 && dx < 80) showUndoPeek();
      bottomGestureStart = null;
    }, { passive: true });

    renderAll();
    askFamilyNameIfNeeded();
  </script>
</body>
</html>
